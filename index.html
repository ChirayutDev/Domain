<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.meebaand.com - Domain for Sale</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* กำหนดค่าตัวแปรสีตาม PALETTE เดิม */
        :root {
            --cream: #FBF7F2;
            --pink: #F7D9DD;
            --lavender: #E3D7F0;
            --mint: #CFEAE3;
            --peach: #F6C9A8;
            --plum: #6B4C66;
            --text: #4A3F4A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(160deg, var(--cream) 0%, var(--pink) 45%, var(--lavender) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        /* Animation เลื่อนขึ้นตอนโหลดหน้าเว็บ */
        @keyframes rise {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-container {
            width: 100%;
            maxWidth: 640px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 30px 60px -20px rgba(160, 120, 150, 0.25);
            position: relative;
            overflow: hidden;
            animation: rise .8s ease both;
        }

        /* ตกแต่งวงกลม Background ซ้าย-ขวา */
        .circle-top {
            position: absolute; width: 160px; height: 160px; border-radius: 50%; background: var(--mint); top: -60px; right: -60px; opacity: 0.6; filter: blur(2px);
        }
        .circle-bottom {
            position: absolute; width: 120px; height: 120px; border-radius: 50%; background: var(--peach); bottom: -40px; left: -40px; opacity: 0.6; filter: blur(2px);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }

        .profile-img {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 10px 24px -8px rgba(107, 76, 102, 0.35);
            flex-shrink: 0;
        }

        .tagline {
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--plum);
            opacity: 0.7;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .domain-name {
            font-family: 'Fraunces', serif;
            font-size: clamp(26px, 5vw, 34px);
            支配-weight: 700;
            color: var(--plum);
            line-height: 1.1;
        }

        .sub-tagline {
            font-size: 15px;
            opacity: 0.75;
            margin-bottom: 28px;
            font-style: italic;
            font-family: 'Fraunces', serif;
        }

        .price-badge {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            background: linear-gradient(135deg, var(--peach), var(--pink));
            border-radius: 18px;
            padding: 14px 26px;
            margin-bottom: 34px;
            box-shadow: 0 10px 24px -8px rgba(230, 160, 150, 0.5);
        }

        .price-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--plum);
            font-family: 'Fraunces', serif;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(107, 76, 102, .2), transparent);
            margin-bottom: 28px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        .icon-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        .info-label {
            font-size: 12px;
            opacity: 0.6;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--plum);
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 32px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 18px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            color: var(--plum);
            border: 1px solid rgba(255, 255, 255, .8);
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 26px -10px rgba(107, 76, 102, .3);
        }

        .btn-fb { background: linear-gradient(135deg, var(--lavender), var(--pink)); }
        .btn-line { background: linear-gradient(135deg, var(--mint), var(--peach)); }

        .btn-call {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
            padding: 18px;
            border-radius: 18px;
            background: var(--plum);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .btn-call:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 26px -10px rgba(107, 76, 102, .45);
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            opacity: 0.5;
            margin-top: 24px;
        }
    </style>
</head>
<body>

            <div class="price-badge">

            </div>

            <div class="divider"></div>

            <div class="info-row">
                <div class="icon-circle" style="background: var(--mint);">👤</div>
                <div>
                    <div class="info-label">เจ้าของโดเมน</div>
                    <div class="info-value">จีระยุทธ วงษ์คำเหลา</div>
                </div>
            </div>

            <div class="info-row">

                <div>
                    <div class="info-label">เบอร์โทรศัพท์</div>
                    <div class="info-value">064-052-4565</div>
                </div>
            </div>

            <div class="grid-buttons">
                <a href="https://www.facebook.com/share/1LfcZUyeEF/" target="_blank" rel="noopener noreferrer" class="btn btn-fb">
                    Facebook
                </a>
                <a href="https://line.me/ti/p/kmwy__R4cs" target="_blank" rel="noopener noreferrer" class="btn btn-line">

                </a>
            </div>

            <a href="tel:0640524565" class="btn-call">
                📞 โทรสอบถาม 064-052-4565
            </a>

            <div class="footer-text">
                สนใจติดต่อสอบถามรายละเอียดเพิ่มเติมได้ทุกช่องทางด้านบน
            </div>
        </div>
    </div>

</body>
</html>
